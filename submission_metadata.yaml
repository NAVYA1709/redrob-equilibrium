ai_usage_summary: |
  Used Gemini-based AI assistant (Antigravity) for data inspection, 
  implementation of ranker filtering logic, heuristic matching criteria, 
  unique reasoning generation, and verification tests.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A hybrid dense retriever and rule-based heuristic scoring engine. We pre-filter 
  the 100K candidate pool using target title keywords, experience ranges (3-15 YOE), 
  and platform completeness. We explicitly detect and filter out all honeypots 
  (impossibilities like last active date before signup date, or skill durations 
  exceeding total experience) and consulting-only careers. The remaining pool is 
  encoded using SentenceTransformers (all-MiniLM-L6-v2) for semantic matching with 
  the JD. We apply heuristic adjustments for experience range (5-9 YOE), target 
  skills (vector DBs, embeddings, evaluation, MLOps), locations, notice periods, 
  and platform activity. Tie-breaking is handled deterministically via candidate_id 
  ascending. Unique, natural-language reasoning is dynamically generated for each 
  of the top 100 candidates.

